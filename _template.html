<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1a24">
<meta name="description" content="{{NAME}} — {{TITLE}}, {{ORG}}. Tap to call, email, connect on LinkedIn, or save to contacts.">
<title>{{NAME}} · {{ORG}}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230e6ba8'/%3E%3Ctext x='32' y='42' font-family='Segoe UI,Helvetica,Arial,sans-serif' font-size='28' font-weight='700' fill='%23ffffff' text-anchor='middle'%3E{{INITIALS}}%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --brand-blue:#40b8ea;
    --brand-green:#7ac143;
    --brand-amber:#f0a31d;
    --primary:#0e6ba8;        /* white text passes WCAG AA (5.7:1) */
    --primary-press:#0c5b8f;
    --glass:rgba(17,30,40,.52);
    --glass-strong:rgba(13,24,32,.9);
    --hairline:rgba(255,255,255,.18);
    --radius:26px;
    --btn-radius:15px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji",sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}

  body{
    margin:0;
    min-height:100svh;
    display:flex;align-items:center;justify-content:center;
    padding:22px;
    color:#fff;
    background:#0b1a24;
    overflow:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* animated project photo (slow Ken Burns) */
  .bg{
    position:fixed;inset:0;z-index:0;
    background:url("{{BACKGROUND}}") center/cover no-repeat;
    transform-origin:center;
    will-change:transform;
    animation:kenburns 34s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    from{transform:scale(1.06) translate(0,0);}
    to{transform:scale(1.20) translate(-2.2%,1.4%);}
  }
  /* readability scrim + vignette over the photo */
  .scrim{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(130% 100% at 50% 0%, rgba(7,16,23,.32) 0%, rgba(7,16,23,.66) 60%, rgba(7,16,23,.82) 100%);
  }

  .card{
    position:relative;z-index:1;
    width:100%;max-width:380px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(135%);
    backdrop-filter:blur(22px) saturate(135%);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    padding:30px 24px 22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.10) inset,
      0 24px 60px -24px rgba(0,0,0,.7);
    text-align:center;
    animation:cardin .6s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(16px) scale(.985);}to{opacity:1;transform:translateY(0) scale(1);}}

  /* fallback if backdrop-filter unsupported: make the card more opaque */
  @supports not ((-webkit-backdrop-filter:blur(1px)) or (backdrop-filter:blur(1px))){
    .card{background:var(--glass-strong);}
  }

  /* headshot avatar */
  .avatar{
    width:96px;height:96px;border-radius:50%;
    margin:0 auto 16px;display:block;object-fit:cover;
    border:2px solid rgba(255,255,255,.65);
    box-shadow:0 0 0 4px rgba(64,184,234,.30), 0 10px 26px -8px rgba(0,0,0,.6);
    background:#0e6ba8;
  }
  .avatar--initials{
    display:flex;align-items:center;justify-content:center;
    font-size:2rem;font-weight:700;color:#fff;letter-spacing:.02em;
    background:linear-gradient(150deg,#1383c7,#0e6ba8);
  }

  .name{margin:0;font-size:1.62rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;}
  .role{margin:8px 0 2px;font-size:1rem;font-weight:600;color:rgba(255,255,255,.9);}
  .org{margin:0 0 20px;font-size:.88rem;font-weight:500;color:rgba(255,255,255,.72);letter-spacing:.01em;}

  .accent{
    width:48px;height:3px;border-radius:3px;margin:0 auto 20px;
    background:linear-gradient(90deg,var(--brand-blue) 0 38%,var(--brand-green) 38% 76%,var(--brand-amber) 76% 100%);
    background-size:200% 100%;
    animation:shimmer 2.6s ease-in-out 1.1s both;
  }
  @keyframes shimmer{0%{background-position:120% 0;}60%,100%{background-position:0 0;}}

  .actions{display:flex;flex-direction:column;gap:10px;}

  .btn{
    position:relative;overflow:hidden;
    display:flex;align-items:center;gap:13px;
    width:100%;min-height:54px;padding:0 17px;
    border-radius:var(--btn-radius);
    font-size:1rem;font-weight:600;text-decoration:none;cursor:pointer;color:#fff;
    transition:transform .14s ease, box-shadow .18s ease, background-color .16s ease, border-color .16s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn .ico{flex:0 0 auto;transition:transform .18s ease;}
  .btn .label{flex:1 1 auto;text-align:left;}
  .btn .chev{flex:0 0 auto;opacity:.6;transition:transform .18s ease;}

  .btn::after{
    content:"";position:absolute;top:0;left:-140%;width:55%;height:100%;
    background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.35) 50%,transparent 100%);
    transform:skewX(-18deg);pointer-events:none;
  }

  /* translucent secondary buttons */
  .btn--ghost{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);}
  .btn--ghost .ico{color:var(--brand-blue);}
  .btn--ghost:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);transform:translateY(-2px);box-shadow:0 10px 22px -12px rgba(0,0,0,.6);}
  .btn--ghost:active{transform:translateY(0) scale(.99);background:rgba(255,255,255,.13);}

  /* primary CTA */
  .btn--primary{
    background:var(--primary);border:1px solid rgba(255,255,255,.18);margin-top:5px;
    box-shadow:0 12px 26px -12px rgba(14,107,168,.9);
    animation:glow 3.6s ease-in-out 1.4s infinite;
  }
  .btn--primary:hover{background:var(--primary-press);transform:translateY(-2px);box-shadow:0 16px 30px -12px rgba(14,107,168,.95);}
  .btn--primary:active{transform:translateY(0) scale(.99);}
  @keyframes glow{0%,100%{box-shadow:0 12px 26px -12px rgba(14,107,168,.6);}50%{box-shadow:0 16px 34px -10px rgba(64,184,234,.85);}}

  .btn:hover::after{animation:sheen .7s ease;}
  .btn:hover .chev{transform:translateX(4px);}
  .btn:hover .ico{transform:scale(1.08);}
  @keyframes sheen{from{left:-140%;}to{left:140%;}}
  .btn--primary::after{animation:sheen-loop 4.2s ease-in-out 2s infinite;}
  @keyframes sheen-loop{0%{left:-140%;}22%,100%{left:140%;}}

  .btn:focus-visible{outline:3px solid var(--brand-blue);outline-offset:2px;}

  .brandmark{display:block;height:24px;width:auto;margin:18px auto 2px;opacity:.92;}

  .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--d,0) * 1ms);}
  @keyframes fadeup{from{opacity:0;transform:translateY(12px) scale(.99);filter:blur(5px);}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important;}
    .btn{transition:none;}
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="scrim" aria-hidden="true"></div>

  <main class="card" aria-label="Digital business card for {{NAME}}">
<!--HS-->
    <img class="avatar reveal" style="--d:50" src="{{HEADSHOT}}" alt="{{NAME}}" width="96" height="96">
<!--/HS-->
<!--NOHS-->
    <div class="avatar avatar--initials reveal" style="--d:50" aria-hidden="true">{{INITIALS}}</div>
<!--/NOHS-->

    <h1 class="name reveal" style="--d:110">{{NAME}}</h1>
    <p class="role reveal" style="--d:160">{{TITLE}}</p>
    <p class="org reveal" style="--d:200">{{ORG}}</p>
    <div class="accent reveal" style="--d:240" aria-hidden="true"></div>

    <nav class="actions" aria-label="Contact actions">
<!--LI-->
      <a class="btn btn--ghost reveal" style="--d:290"
         href="{{LINKEDIN}}"
         target="_blank" rel="noopener noreferrer"
         aria-label="View {{NAME}} on LinkedIn (opens in a new tab)">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95C20.4 8.75 21 11 21 14.1V21h-4v-6.1c0-1.45-.03-3.3-2.02-3.3-2.02 0-2.33 1.57-2.33 3.2V21H9z"/></svg>
        <span class="label">LinkedIn</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>
<!--/LI-->
      <a class="btn btn--ghost reveal" style="--d:340"
         href="tel:{{TEL_HREF}}"
         aria-label="Call {{NAME}} on {{TEL_DISPLAY}}">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.66A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span class="label">Call</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="btn btn--ghost reveal" style="--d:390"
         href="mailto:{{EMAIL}}"
         aria-label="Email {{NAME}} at {{EMAIL}}">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <span class="label">Email</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="btn btn--primary reveal" style="--d:440"
         href="contact.vcf" type="text/vcard"
         aria-label="Add {{NAME}} to your contacts">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        <span class="label">Add to contacts</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </nav>

    <img class="brandmark reveal" style="--d:490" src="{{LOGO}}" alt="" aria-hidden="true">
  </main>
</body>
</html>
