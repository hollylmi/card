<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E2A43">
<meta name="description" content="{{NAME}} — {{TITLE}}, {{ORG}}. Tap to call, email, connect on LinkedIn, or save to contacts.">
<title>{{NAME}} · {{ORG}}</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233BA9DE'/%3E%3Cstop offset='1' stop-color='%236ABF4B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230E2A43'/%3E%3Ctext x='32' y='42' font-family='Montserrat,Segoe UI,Helvetica,Arial,sans-serif' font-size='27' font-weight='700' fill='url(%23g)' text-anchor='middle'%3E{{INITIALS}}%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
  /* Animatable angle for the rotating gradient rings (graceful static fallback) */
  @property --angle{syntax:"<angle>";initial-value:0deg;inherits:false;}

  :root{
    /* LMI brand palette */
    --blue:#3BA9DE;
    --blue-dark:#1E7FB5;
    --green:#6ABF4B;
    --amber:#EDA33D;
    --navy:#0E2A43;
    --slate:#41546A;
    --mist:#F4F8FB;
    --line:#E3EAF1;

    --glass:rgba(14,42,67,.46);
    --glass-strong:rgba(11,28,45,.92);
    --hairline:rgba(255,255,255,.16);
    --radius:26px;
    --btn-radius:14px;

    --font-head:"Montserrat",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-family:var(--font-body);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}

  body{
    margin:0;
    min-height:100svh;
    display:flex;align-items:center;justify-content:center;
    padding:22px;
    color:#fff;
    background:var(--navy);
    overflow:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* animated project photo (slow Ken Burns) */
  .bg{
    position:fixed;inset:0;z-index:0;
    background:url("{{BACKGROUND}}") center/cover no-repeat;
    transform-origin:center;
    will-change:transform;
    animation:kenburns 36s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    from{transform:scale(1.06) translate(0,0);}
    to{transform:scale(1.20) translate(-2.2%,1.4%);}
  }

  /* deep navy readability scrim + vignette over the photo */
  .scrim{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(130% 100% at 50% 0%, rgba(14,42,67,.30) 0%, rgba(11,28,45,.72) 58%, rgba(8,20,34,.88) 100%);
  }

  /* drifting aurora blobs — glowing brand colours for a high-tech backdrop */
  .aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .aurora i{
    position:absolute;display:block;width:56vmax;height:56vmax;border-radius:50%;
    filter:blur(70px);opacity:.42;mix-blend-mode:screen;will-change:transform;
  }
  .aurora .a1{background:radial-gradient(circle at 50% 50%,var(--blue),transparent 62%);top:-22%;left:-16%;animation:drift1 26s ease-in-out infinite alternate;}
  .aurora .a2{background:radial-gradient(circle at 50% 50%,var(--green),transparent 62%);bottom:-26%;right:-18%;animation:drift2 30s ease-in-out infinite alternate;}
  .aurora .a3{background:radial-gradient(circle at 50% 50%,var(--amber),transparent 64%);top:34%;right:-24%;width:40vmax;height:40vmax;opacity:.30;animation:drift3 34s ease-in-out infinite alternate;}
  @keyframes drift1{from{transform:translate(0,0) scale(1);}to{transform:translate(14%,10%) scale(1.15);}}
  @keyframes drift2{from{transform:translate(0,0) scale(1.05);}to{transform:translate(-12%,-8%) scale(1);}}
  @keyframes drift3{from{transform:translate(0,0) scale(1);}to{transform:translate(-16%,12%) scale(1.2);}}

  /* ---- the card ---- */
  .card{
    position:relative;z-index:1;isolation:isolate;
    width:100%;max-width:384px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(24px) saturate(140%);
    backdrop-filter:blur(24px) saturate(140%);
    border:1px solid var(--hairline);
    border-radius:var(--radius);
    padding:0 24px 24px;
    overflow:hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.12) inset,
      0 30px 70px -28px rgba(0,0,0,.75);
    text-align:center;
    animation:cardin .65s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(18px) scale(.985);}to{opacity:1;transform:translateY(0) scale(1);}}

  /* rotating tri-accent gradient glow, masked to a hairline ring around the card */
  .card::before{
    content:"";position:absolute;inset:0;z-index:-1;border-radius:inherit;padding:1.4px;
    background:conic-gradient(from var(--angle),var(--blue),var(--green),var(--amber),var(--blue));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
            mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    opacity:.85;
    animation:spin 7s linear infinite;
  }
  @keyframes spin{to{--angle:360deg;}}

  /* signature bar — tri-accent gradient across the top, with a travelling shimmer */
  .sigbar{
    position:relative;height:5px;margin:0 -24px 26px;overflow:hidden;
    background:linear-gradient(90deg,var(--blue),var(--green),var(--amber));
    background-size:200% 100%;
    animation:sigflow 8s ease-in-out infinite;
  }
  .sigbar::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.85) 50%,transparent 100%);
    transform:translateX(-100%) skewX(-18deg);
    animation:sigshine 4.6s ease-in-out 1.2s infinite;
  }
  @keyframes sigflow{0%,100%{background-position:0% 0;}50%{background-position:100% 0;}}
  @keyframes sigshine{0%{transform:translateX(-120%) skewX(-18deg);}45%,100%{transform:translateX(220%) skewX(-18deg);}}

  .inner{padding-top:6px;}

  /* fallback if backdrop-filter unsupported: make the card more opaque */
  @supports not ((-webkit-backdrop-filter:blur(1px)) or (backdrop-filter:blur(1px))){
    .card{background:var(--glass-strong);}
  }

  /* headshot with a rotating brand-gradient ring */
  .avatar-wrap{position:relative;width:106px;height:106px;margin:0 auto 16px;border-radius:50%;}
  .avatar-wrap::before{
    content:"";position:absolute;inset:-3px;border-radius:50%;z-index:0;
    background:conic-gradient(from var(--angle),var(--blue),var(--green),var(--amber),var(--blue));
    animation:spin 6s linear infinite;
    box-shadow:0 0 22px -4px rgba(59,169,222,.55);
  }
  .avatar{
    position:relative;z-index:1;
    width:106px;height:106px;border-radius:50%;
    display:block;object-fit:cover;
    border:3px solid var(--navy);
    background:var(--navy);
    box-shadow:0 10px 26px -8px rgba(0,0,0,.6);
  }
  .avatar--initials{
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-head);
    font-size:2rem;font-weight:700;color:#fff;letter-spacing:.01em;
    background:linear-gradient(135deg,var(--blue),var(--green));
  }

  /* name — Montserrat with a periodic metallic shine sweep */
  .name{
    margin:0;font-family:var(--font-head);font-size:1.62rem;font-weight:700;
    letter-spacing:-.02em;line-height:1.14;
    color:#fff;
    background:linear-gradient(100deg,#fff 0%,#fff 42%,#cdeeff 50%,#fff 58%,#fff 100%);
    background-size:220% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:nameshine 6.5s ease-in-out infinite;
  }
  @keyframes nameshine{0%{background-position:130% 0;}55%,100%{background-position:-30% 0;}}

  .role{margin:9px 0 2px;font-family:var(--font-head);font-size:1rem;font-weight:600;color:rgba(255,255,255,.94);}
  .org{margin:0 0 18px;font-size:.86rem;font-weight:500;color:rgba(255,255,255,.72);letter-spacing:.01em;}

  /* flowing tri-accent divider */
  .accent{
    width:72px;height:4px;border-radius:4px;margin:2px auto 24px;
    background:linear-gradient(90deg,var(--blue),var(--green),var(--amber),var(--blue));
    background-size:250% 100%;
    animation:accentflow 5s linear infinite;
  }
  @keyframes accentflow{from{background-position:0% 0;}to{background-position:100% 0;}}

  .actions{display:flex;flex-direction:column;gap:10px;}

  .btn{
    position:relative;overflow:hidden;
    display:flex;align-items:center;gap:13px;
    width:100%;min-height:54px;padding:0 17px;
    border-radius:var(--btn-radius);
    font-family:var(--font-body);
    font-size:1rem;font-weight:600;text-decoration:none;cursor:pointer;color:#fff;
    transition:transform .14s ease, box-shadow .18s ease, background-color .16s ease, border-color .16s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn .ico{flex:0 0 auto;transition:transform .18s ease;}
  .btn .label{flex:1 1 auto;text-align:left;}
  .btn .chev{flex:0 0 auto;opacity:.6;transition:transform .18s ease;}

  /* glossy diagonal sheen that sweeps on hover */
  .btn::after{
    content:"";position:absolute;top:0;left:-140%;width:55%;height:100%;
    background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.35) 50%,transparent 100%);
    transform:skewX(-18deg);pointer-events:none;
  }

  /* translucent secondary buttons with a brand-gradient hover edge */
  .btn--ghost{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.20);}
  .btn--ghost .ico{color:var(--blue);}
  .btn--ghost:hover{background:rgba(255,255,255,.16);border-color:rgba(59,169,222,.75);transform:translateY(-2px);box-shadow:0 12px 24px -12px rgba(0,0,0,.6),0 0 18px -6px rgba(59,169,222,.5);}
  .btn--ghost:active{transform:translateY(0) scale(.99);background:rgba(255,255,255,.12);}

  /* primary CTA — brand blue gradient (blue → blue-dark), never green */
  .btn--primary{
    color:#fff;margin-top:5px;
    background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);
    border:1px solid rgba(255,255,255,.22);
    text-shadow:0 1px 2px rgba(9,30,50,.55);
    box-shadow:0 14px 28px -12px rgba(30,127,181,.9),0 0 0 rgba(59,169,222,.5);
    animation:glow 3.8s ease-in-out 1.4s infinite;
  }
  .btn--primary .ico,.btn--primary .chev{color:#fff;}
  .btn--primary:hover{transform:translateY(-2px);box-shadow:0 18px 34px -12px rgba(30,127,181,.95),0 0 22px -4px rgba(59,169,222,.7);}
  .btn--primary:active{transform:translateY(0) scale(.99);}
  @keyframes glow{0%,100%{box-shadow:0 14px 28px -12px rgba(30,127,181,.55);}50%{box-shadow:0 16px 36px -10px rgba(59,169,222,.85);}}

  .btn:hover::after{animation:sheen .7s ease;}
  .btn:hover .chev{transform:translateX(4px);}
  .btn:hover .ico{transform:scale(1.08);}
  @keyframes sheen{from{left:-140%;}to{left:140%;}}
  .btn--primary::after{animation:sheen-loop 4.4s ease-in-out 2s infinite;}
  @keyframes sheen-loop{0%{left:-140%;}22%,100%{left:140%;}}

  .btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px;}

  .brandmark{display:block;height:44px;width:auto;max-width:72%;margin:22px auto 4px;opacity:.96;filter:drop-shadow(0 4px 12px rgba(0,0,0,.35));}

  .reveal{animation:fadeup .5s cubic-bezier(.2,.7,.2,1) both;animation-delay:calc(var(--d,0) * 1ms);}
  @keyframes fadeup{from{opacity:0;transform:translateY(12px) scale(.99);filter:blur(5px);}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation:none !important;}
    .btn{transition:none;}
    .name{-webkit-text-fill-color:#fff;color:#fff;background:none;}
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="scrim" aria-hidden="true"></div>
  <div class="aurora" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>

  <main class="card" aria-label="Digital business card for {{NAME}}">
    <div class="sigbar" aria-hidden="true"></div>
    <div class="inner">
<!--HS-->
    <div class="avatar-wrap reveal" style="--d:50">
      <img class="avatar" src="{{HEADSHOT}}" alt="{{NAME}}" width="106" height="106">
    </div>
<!--/HS-->
<!--NOHS-->
    <div class="avatar-wrap reveal" style="--d:50">
      <div class="avatar avatar--initials" aria-hidden="true">{{INITIALS}}</div>
    </div>
<!--/NOHS-->

    <h1 class="name reveal" style="--d:110">{{NAME}}</h1>
    <p class="role reveal" style="--d:160">{{TITLE}}</p>
    <p class="org reveal" style="--d:200">{{ORG}}</p>
    <div class="accent reveal" style="--d:240" aria-hidden="true"></div>

    <nav class="actions" aria-label="Contact actions">
<!--LI-->
      <a class="btn btn--ghost reveal" style="--d:290"
         href="{{LINKEDIN}}"
         target="_blank" rel="noopener noreferrer"
         aria-label="View {{NAME}} on LinkedIn (opens in a new tab)">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95C20.4 8.75 21 11 21 14.1V21h-4v-6.1c0-1.45-.03-3.3-2.02-3.3-2.02 0-2.33 1.57-2.33 3.2V21H9z"/></svg>
        <span class="label">LinkedIn</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>
<!--/LI-->
      <a class="btn btn--ghost reveal" style="--d:340"
         href="tel:{{TEL_HREF}}"
         aria-label="Call {{NAME}} on {{TEL_DISPLAY}}">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.66A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span class="label">Call</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="btn btn--ghost reveal" style="--d:390"
         href="mailto:{{EMAIL}}"
         aria-label="Email {{NAME}} at {{EMAIL}}">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <span class="label">Email</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>

      <a class="btn btn--primary reveal" style="--d:440"
         href="contact.vcf" type="text/vcard"
         aria-label="Add {{NAME}} to your contacts">
        <svg class="ico" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg>
        <span class="label">Add to contacts</span>
        <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
      </a>
    </nav>

    <img class="brandmark reveal" style="--d:490" src="{{LOGO}}" alt="" aria-hidden="true">
    </div>
  </main>
</body>
</html>
